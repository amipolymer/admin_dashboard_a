<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Profile</title>
 <style>
        body {
            background: #f5f7fb;
        }

        .sidebar {
            min-height: 100vh;
            background: #0d6efd;
        }

        .sidebar a {
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(255,255,255,0.15);
        }

        .card-custom {
            border: 0;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container-fluid">
    <div class="row">

        <div class="col-lg-2 sidebar p-3">
            <h4 class="text-white mb-4">HR Portal</h4>

            <a href="index.html"><i class="bi bi-grid"></i> Dashboard</a>
            <a href="profile.html" class="active"><i class="bi bi-person"></i> My Profile</a>
            <a href="documents.html"><i class="bi bi-file-earmark"></i> Documents</a>
            <a href="offer-letter.html"><i class="bi bi-file-pdf"></i> Offer Letter</a>
            <a href="bgv-status.html"><i class="bi bi-shield-check"></i> View Status</a>
            <!-- <a href="bgv-status.html"><i class="bi bi-shield-check"></i> BGV Status</a> -->
        </div>
         <div class="col-lg-10 p-4">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">

            <h3 class="mb-4">Candidate Information</h3>

            <form>

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Mobile Number</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select">
                            <option>Select</option>
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Current Address</label>
                        <textarea class="form-control" rows="4"></textarea>
                    </div>

                </div>

                <div class="mt-4 text-end">
                    <button class="btn btn-outline-secondary">Save Draft</button>
                    <button class="btn btn-primary">Save & Continue</button>
                </div>

            </form>

        </div>
    </div>

</div>
</div>

</body>
</html>
